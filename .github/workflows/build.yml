name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  generate-corpus:
    runs-on: ubuntu-latest
    name: Generate Test Corpus

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Generate test corpus
        run: ./gradlew :targets:fabric_1_20_to_1_20_1:generateTestCorpus

      - name: Upload corpus
        uses: actions/upload-artifact@v4
        with:
          name: test-corpus
          path: modules/core-testkit/src/test/resources/corpus
          if-no-files-found: error

  build:
    runs-on: ubuntu-latest
    needs: generate-corpus
    strategy:
      matrix:
        loader:
          - name: Fabric
            task: buildFabric
            artifact: fabric
            paths: modules/targets/fabric_*/build/libs/*.jar
          - name: Forge
            task: buildForge
            artifact: forge
            paths: modules/targets/forge_*/build/libs/*.jar
          - name: NeoForge
            task: buildNeoForge
            artifact: neoforge
            paths: modules/targets/neoforge_*/build/libs/*.jar

    name: Build ${{ matrix.loader.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Download corpus
        uses: actions/download-artifact@v4
        with:
          name: test-corpus
          path: modules/core-testkit/src/test/resources/corpus

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build ${{ matrix.loader.name }}
        run: ./gradlew ${{ matrix.loader.task }}

      - name: Upload ${{ matrix.loader.name }} jars
        uses: actions/upload-artifact@v4
        with:
          name: jars-${{ matrix.loader.artifact }}
          path: ${{ matrix.loader.paths }}
          exclude: |
            **/*-sources.jar
            **/*-javadoc.jar
          if-no-files-found: error
