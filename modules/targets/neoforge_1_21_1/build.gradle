def prepareNeoFormLibraries = tasks.register('prepareNeoFormLibraries')
def prepareNeoFormTransformLibraries = tasks.register('prepareNeoFormTransformLibraries')
def prepareNeoFormTransformedSources = tasks.register('prepareNeoFormTransformedSources')
def prepareNeoFormRecompiledJar = tasks.register('prepareNeoFormRecompiledJar')
def prepareNeoFormMixinMappings = tasks.register('prepareNeoFormMixinMappings')

gradle.projectsEvaluated {
    def originalTask = tasks.findByName('neoFormListLibraries')
    def originalTransformTask = tasks.findByName('neoFormListTransformLibraries')
    def originalTransformSourceTask = tasks.findByName('neoFormTransformSource')
    def originalRecompileTask = tasks.findByName('neoFormRecompile')
    def originalMergeMappingsTask = tasks.findByName('neoFormMergeMappings')
    if (originalTask == null || originalTransformTask == null || originalTransformSourceTask == null || originalRecompileTask == null || originalMergeMappingsTask == null) {
        return
    }

    def useCachedLibraries = findCachedNeoFormLibrariesFile() != null
    def useCachedTransformLibraries = findCachedNeoFormLibrariesFile() != null
    def useCachedTransformedSources = findCachedNeoFormSourceJar() != null
    def useCachedRecompiledJar = findCachedNeoFormCompiledJar() != null

    prepareNeoFormLibraries.configure {
        onlyIf { useCachedLibraries }
        dependsOn sanitizeMinecraftVersionMetadata
        doLast {
            def sourceFile = findCachedNeoFormLibrariesFile()
            if (sourceFile == null) {
                throw new GradleException('Could not find a cached NeoForm libraries.txt without the broken macOS patch artifact')
            }

            def outputFile = originalTask.output.get().asFile
            outputFile.parentFile.mkdirs()
            outputFile.text = sourceFile.readLines().findAll { line ->
                !line.contains('natives-macos-patch')
            }.join(System.lineSeparator()) + System.lineSeparator()
            originalTask.librariesDirectory.get().asFile.mkdirs()
        }
    }

    prepareNeoFormTransformLibraries.configure {
        onlyIf { useCachedTransformLibraries }
        dependsOn sanitizeMinecraftVersionMetadata
        doLast {
            def sourceFile = findCachedNeoFormLibrariesFile()
            if (sourceFile == null) {
                throw new GradleException('Could not find a cached NeoForm libraries.txt without the broken macOS patch artifact')
            }

            def outputFile = originalTransformTask.output.get().asFile
            outputFile.parentFile.mkdirs()
            outputFile.text = sourceFile.readLines().findAll { line ->
                !line.contains('natives-macos-patch')
            }.join(System.lineSeparator()) + System.lineSeparator()
            originalTransformTask.librariesDirectory.get().asFile.mkdirs()
        }
    }

    prepareNeoFormTransformedSources.configure {
        onlyIf { useCachedTransformedSources }
        dependsOn sanitizeMinecraftVersionMetadata
        doLast {
            def sourceJar = findCachedNeoFormSourceJar()
            if (sourceJar == null) {
                throw new GradleException('Could not find a cached NeoForm transformed source jar')
            }

            def outputFile = originalTransformSourceTask.output.get().asFile
            outputFile.parentFile.mkdirs()
            outputFile.bytes = sourceJar.bytes
        }
    }

    prepareNeoFormRecompiledJar.configure {
        onlyIf { useCachedRecompiledJar }
        dependsOn prepareNeoFormTransformedSources
        doLast {
            def compiledJar = findCachedNeoFormCompiledJar()
            if (compiledJar == null) {
                throw new GradleException('Could not find a cached NeoForm compiled jar')
            }

            def outputFile = originalRecompileTask.output.get().asFile
            outputFile.parentFile.mkdirs()
            outputFile.bytes = compiledJar.bytes
        }
    }

    prepareNeoFormMixinMappings.configure {
        dependsOn originalMergeMappingsTask
        doLast {
            createNamedToSrgTsrgFile()
        }
    }

    originalTask.onlyIf { !useCachedLibraries }
    originalTransformTask.onlyIf { !useCachedTransformLibraries }
    originalTransformSourceTask.onlyIf { !useCachedTransformedSources }
    originalRecompileTask.onlyIf { !useCachedRecompiledJar }
    tasks.matching { candidate ->
        candidate.name.startsWith('neoForm') &&
                candidate.name != 'neoFormListLibraries' &&
                candidate.name != 'neoFormListTransformLibraries' &&
                candidate.name != 'prepareNeoFormLibraries' &&
                candidate.name != 'prepareNeoFormTransformLibraries' &&
                candidate.name != 'prepareNeoFormTransformedSources' &&
                candidate.name != 'prepareNeoFormRecompiledJar'
    }.configureEach {
        if (useCachedLibraries) {
            dependsOn prepareNeoFormLibraries
        }
        if (useCachedTransformLibraries) {
            dependsOn prepareNeoFormTransformLibraries
        }
        if (useCachedTransformedSources) {
            dependsOn prepareNeoFormTransformedSources
        }
        if (useCachedRecompiledJar) {
            dependsOn prepareNeoFormRecompiledJar
        }
    }
}

