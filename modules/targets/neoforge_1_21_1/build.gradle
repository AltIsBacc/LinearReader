def sanitizeMinecraftMetadata = { File metadataFile ->
    if (!metadataFile.exists()) {
        return false
    }

    def metadata = new JsonSlurper().parse(metadataFile)
    if (!(metadata instanceof Map) || !(metadata.libraries instanceof List)) {
        return false
    }

    def libraries = metadata.libraries as List
    def sanitizedLibraries = libraries.findAll { library ->
        library?.name != brokenLwjglClassifier
    }
    if (sanitizedLibraries.size() == libraries.size()) {
        return false
    }

    metadata.libraries = sanitizedLibraries
    metadataFile.text = JsonOutput.prettyPrint(JsonOutput.toJson(metadata))
    true
}

def sanitizeMetadataCaches = {
    def metadataCandidates = [
            new File(gradle.gradleUserHomeDir, "caches/minecraft/versions/${minecraftVersion}/metadata.json"),
            file(".gradle/caches/minecraft/versions/${minecraftVersion}/metadata.json")
    ].unique()

    metadataCandidates.each { metadataFile ->
        if (sanitizeMinecraftMetadata(metadataFile)) {
            logger.lifecycle("Sanitized ${brokenLwjglClassifier} from ${metadataFile}")
        }
    }
}

def sanitizeDummyIvy = { File ivyFile ->
    if (!ivyFile.exists()) {
        return false
    }

    def ivy = new XmlParser(false, false).parse(ivyFile)
    def dependencies = ivy.dependencies?.getAt(0)
    if (dependencies == null) {
        return false
    }

    def brokenDependencies = dependencies.children().findAll { dependency ->
        dependency.name() == 'dependency' &&
                dependency.attribute('org') == 'org.lwjgl' &&
                dependency.attribute('name') == 'lwjgl-freetype' &&
                dependency.attribute('rev') == '3.3.3' &&
                dependency.children().any { artifact ->
                    artifact.name() == 'artifact' &&
                            artifact.attribute('classifier') == 'natives-macos-patch'
                }
    }
    if (brokenDependencies.isEmpty()) {
        return false
    }

    brokenDependencies.each { dependencies.remove(it) }
    ivyFile.text = XmlUtil.serialize(ivy)
    true
}

def sanitizeResolutionInputs = {
    sanitizeMetadataCaches()
    def ivyFile = file(".gradle/repositories/ng_dummy_ng/net/neoforged/neoforge/${neoforgeVersion}/ivy-${neoforgeVersion}-ng2.xml")
    if (sanitizeDummyIvy(ivyFile)) {
        logger.lifecycle("Sanitized ${brokenLwjglClassifier} from ${ivyFile}")
    }
}

def findCachedNeoFormLibrariesFile = {
    def cacheRoot = new File(gradle.gradleUserHomeDir, 'caches/ng_execute')
    if (!cacheRoot.exists()) {
        return null
    }

    def candidates = fileTree(cacheRoot) {
        include '**/libraries.txt'
    }.files.findAll { candidate ->
        candidate.isFile() &&
                candidate.text.contains('lwjgl-freetype-3.3.3-natives-macos-arm64.jar') &&
                !candidate.text.contains('natives-macos-patch')
    }
    candidates.sort { left, right ->
        right.lastModified() <=> left.lastModified()
    }
    candidates ? candidates.first() : null
}

def jarContainsEntries = { File jarFile, List<String> requiredEntries ->
    if (!jarFile.isFile()) {
        return false
    }

    def zip = new ZipFile(jarFile)
    try {
        requiredEntries.every { entryName -> zip.getEntry(entryName) != null }
    } finally {
        zip.close()
    }
}

def findCachedNeoFormSourceJar = {
    def cacheRoot = new File(gradle.gradleUserHomeDir, 'caches/ng_execute')
    if (!cacheRoot.exists()) {
        return null
    }

    def candidates = fileTree(cacheRoot) {
        include '**/outputs.jar'
    }.files.findAll { candidate ->
        jarContainsEntries(candidate, [
                'META-INF/neoforge.mods.toml',
                'com/mojang/blaze3d/Blaze3D.java',
                'net/minecraft/server/MinecraftServer.java'
        ])
    }
    candidates.sort { left, right ->
        right.lastModified() <=> left.lastModified()
    }
    candidates ? candidates.first() : null
}

