def createNamedToSrgTsrgFile = {
    def namedSourceFile = findGeneratedNeoFormNamedTsrgFile()
    if (namedSourceFile == null) {
        throw new GradleException('Could not find generated NeoForm obf->named mappings')
    }

    def neoFormArchive = findCachedNeoFormArchive()
    if (neoFormArchive == null) {
        throw new GradleException('Could not find cached NeoForm archive with joined.tsrg')
    }

    def targetFile = file("${buildDir}/tmp/mixin/reobf-srg.tsrg")
    targetFile.parentFile.mkdirs()

    def obfToNamedClass = [:]
    def memberIds = [:]

    def archiveZip = new ZipFile(neoFormArchive)
    def joinedEntry = archiveZip.getEntry('config/joined.tsrg')
    if (joinedEntry == null) {
        archiveZip.close()
        throw new GradleException("Could not find config/joined.tsrg inside ${neoFormArchive}")
    }

    def joinedCurrentClass = null
    archiveZip.getInputStream(joinedEntry).withCloseable { stream ->
        stream.newReader('UTF-8').eachLine { line ->
            if (line.startsWith('tsrg2') || line.trim().isEmpty() || line.startsWith('\t\t')) {
                return
            }

            def parts = line.trim().split(/\s+/)
            if (!line.startsWith('\t')) {
                if (parts.length >= 2) {
                    joinedCurrentClass = parts[0]
                }
                return
            }

            if (joinedCurrentClass == null) {
                return
            }

            if (parts.length == 3) {
                memberIds["F|${joinedCurrentClass}|${parts[0]}"] = parts[2]
            } else if (parts.length >= 4 && parts[1].startsWith('(')) {
                memberIds["M|${joinedCurrentClass}|${parts[0]}|${parts[1]}"] = parts[3]
            }
        }
    }
    archiveZip.close()

    namedSourceFile.eachLine { line ->
        if (line.startsWith('tsrg2') || line.trim().isEmpty() || line.startsWith('\t\t')) {
            return
        }
        if (line.startsWith('\t')) {
            return
        }
        def parts = line.trim().split(/\s+/)
        if (parts.length >= 2) {
            obfToNamedClass[parts[0]] = parts[1]
        }
    }

    def remapDescriptorToNamed = { String descriptor ->
        descriptor.replaceAll(/L([^;]+);/) { full, className ->
            "L${obfToNamedClass.getOrDefault(className as String, className as String)};"
        }
    }

    def seargeFieldName = { String obfName, String namedName, String id ->
        if (obfName == namedName || id == null) {
            return namedName
        }
        "f_${id}_"
    }

    def seargeMethodName = { String obfName, String namedName, String id ->
        if (namedName in ['<init>', '<clinit>'] || obfName == namedName || id == null) {
            return namedName
        }
        "m_${id}_"
    }

    def generatedLines = ['tsrg2 left right']
    def namedCurrentClass = null
    def obfCurrentClass = null
    namedSourceFile.eachLine { line ->
        if (line.startsWith('tsrg2') || line.trim().isEmpty() || line.startsWith('\t\t')) {
            return
        }

        def parts = line.trim().split(/\s+/)
        if (!line.startsWith('\t')) {
            if (parts.length >= 2) {
                obfCurrentClass = parts[0]
                namedCurrentClass = parts[1]
                generatedLines << "${namedCurrentClass} ${namedCurrentClass}"
            }
            return
        }

        if (namedCurrentClass == null || obfCurrentClass == null) {
            return
        }

        if (parts.length == 2) {
            def fieldId = memberIds["F|${obfCurrentClass}|${parts[0]}"]
            generatedLines << "\t${parts[1]} ${seargeFieldName(parts[0], parts[1], fieldId)}"
        } else if (parts.length >= 3 && parts[1].startsWith('(')) {
            def methodId = memberIds["M|${obfCurrentClass}|${parts[0]}|${parts[1]}"]
            generatedLines << "\t${parts[2]} ${remapDescriptorToNamed(parts[1])} ${seargeMethodName(parts[0], parts[2], methodId)}"
        }
    }

    targetFile.text = generatedLines.join(System.lineSeparator()) + System.lineSeparator()
    targetFile
}

