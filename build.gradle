tasks.register('cleanAll') {
    group = 'linearreader'
    description = 'Cleans all live targets.'
    dependsOn fabric1201Target.tasks.named('clean')
    dependsOn fabric1202To1214Target.tasks.named('clean')
    dependsOn fabric1215To12110Target.tasks.named('clean')
    dependsOn fabric12111Target.tasks.named('clean')
    dependsOn forge1201Target.tasks.named('clean')
    dependsOn neoforge1211Target.tasks.named('clean')
}

tasks.register('compileJava') {
    group = 'build'
    description = 'Compiles all target Java sources.'
    dependsOn tasks.named('compileAll')
}

tasks.register('test') {
    group = 'verification'
    description = 'Runs all target tests.'
    dependsOn tasks.named('testAll')
}

tasks.named('build').configure {
    dependsOn tasks.named('buildAll')
}

tasks.named('clean').configure {
    dependsOn tasks.named('cleanAll')
}

tasks.named('check').configure {
    dependsOn tasks.named('testAll')
}

tasks.register('collectJars', Copy) {
    group = 'linearreader'
    description = 'Collects built mod jars from all loader targets into root/build/collected-jars.'
    dependsOn tasks.named('buildAll')
    into layout.buildDirectory.dir('collected-jars')

    from(fabric1201Target.layout.buildDirectory.dir('libs')) {
        include '*.jar'
        exclude '*-sources.jar', '*-javadoc.jar'
        into 'fabric_1_20_to_1_20_1'
    }

    from(fabric1202To1214Target.layout.buildDirectory.dir('libs')) {
        include '*.jar'
        exclude '*-sources.jar', '*-javadoc.jar'
        into 'fabric_1_20_2_to_1_21_4'
    }

    from(fabric1215To12110Target.layout.buildDirectory.dir('libs')) {
        include '*.jar'
        exclude '*-sources.jar', '*-javadoc.jar'
        into 'fabric_1_21_5_to_1_21_10'
    }

    from(fabric12111Target.layout.buildDirectory.dir('libs')) {
        include '*.jar'
        exclude '*-sources.jar', '*-javadoc.jar'
        into 'fabric_1_21_11'
    }

    from(forge1201Target.layout.buildDirectory.dir('libs')) {
        include '*.jar'
        exclude '*-sources.jar', '*-javadoc.jar'
        into 'forge_1_20_to_1_20_1'
    }

    from(neoforge1211Target.layout.buildDirectory.dir('libs')) {
        include '*.jar'
        exclude '*-sources.jar', '*-javadoc.jar'
        into 'neoforge_1_21_1'
    }
}
