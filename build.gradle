plugins {
    id 'base'
}

def fabric1201Target = project(':targets:fabric_1_20_to_1_20_1')
def fabric1202To1214Target = project(':targets:fabric_1_20_2_to_1_21_4')
def fabric1215To12110Target = project(':targets:fabric_1_21_5_to_1_21_10')
def fabric12111Target = project(':targets:fabric_1_21_11')
def forge1201Target = project(':targets:forge_1_20_to_1_20_1')
def neoforge1211Target = project(':targets:neoforge_1_21_1')

tasks.register('compileAll') {
    group = 'linearreader'
    description = 'Compiles all live targets.'
    dependsOn fabric1201Target.tasks.named('compileJava')
    dependsOn fabric1202To1214Target.tasks.named('compileJava')
    dependsOn fabric1215To12110Target.tasks.named('compileJava')
