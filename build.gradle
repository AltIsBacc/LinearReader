    description = 'Builds all live targets.'
    dependsOn fabric1201Target.tasks.named('build')
    dependsOn fabric1202To1214Target.tasks.named('build')
    dependsOn fabric1215To12110Target.tasks.named('build')
    dependsOn fabric12111Target.tasks.named('build')
    dependsOn forge1201Target.tasks.named('build')
    dependsOn neoforge1211Target.tasks.named('build')
}

tasks.register('testAll') {
    group = 'linearreader'
    description = 'Runs the shared storage test suite in all live target environments.'
    dependsOn fabric1201Target.tasks.named('test')
    dependsOn fabric1202To1214Target.tasks.named('test')
    dependsOn fabric1215To12110Target.tasks.named('test')
    dependsOn fabric12111Target.tasks.named('test')
    dependsOn forge1201Target.tasks.named('test')
    dependsOn neoforge1211Target.tasks.named('test')
